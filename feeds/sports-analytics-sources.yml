schema_version: 1
last_verified: 2026-07-12
scope:
  description: >
    Curated seed catalog for a sports analytics research paper feed and
    opportunity feed covering journals, conference CFPs, paper competitions,
    posters, presentations, hackathons, data challenges, and Kaggle competitions.
  inclusion_rules:
    - Prefer official journal, conference, publisher, society, or competition pages.
    - Use true RSS or XML feeds where available.
    - For sources without RSS, poll the listed URL and watch for changes in calls, programs, proceedings, and submission pages.
    - Treat dates as perishable; re-check active opportunities before submitting.

journal_sources:
  - id: jqas
    name: Journal of Quantitative Analysis in Sports
    publisher: De Gruyter Brill
    type: journal
    priority: core
    homepage: https://www.degruyterbrill.com/journal/key/jqas/html
    latest_issue_url: https://www.degruyterbrill.com/journal/key/jqas/html
    submission_url: https://mc.manuscriptcentral.com/dgjqas
    secondary_index_url: https://ideas.repec.org/s/bpj/jqsprt.html
    feed_kind: poll
    feed_url:
    cadence: quarterly
    notes:
      - Official journal of the American Statistical Association.
      - Current volume was listed as open access via Subscribe to Open when verified.
      - RePEc/IDEAS provides a compact issue index useful for article discovery, but not a primary publisher feed.
    tags: [journal, statistics, operations-research, machine-learning, sports-management]

  - id: jsa
    name: Journal of Sports Analytics
    publisher: SAGE Journals
    type: journal
    priority: core
    homepage: https://journals.sagepub.com/home/san
    alerts_url: https://journals.sagepub.com/connected/san
    feed_kind: rss
    feed_url: https://journals.sagepub.com/action/showFeed?ai=2b4&feed=rss&jc=san&mi=ehikzz&type=etoc&ui=0
    submission_url: https://journals.sagepub.com/author-instructions/SAN
    cadence: rolling_and_issue
    notes:
      - SAGE exposes recent-article RSS for this title.
      - The journal positions itself around practical sports analytics applications for teams, leagues, fans, and academics.
    tags: [journal, applied-analytics, sports-business, strategy]

  - id: ijcss
    name: International Journal of Computer Science in Sport
    publisher: Paradigm Publishing Services / International Association of Computer Science in Sport
    type: journal
    priority: core
    homepage: https://reference-global.com/journal/IJCSS
    secondary_index_url: https://dblp.org/db/journals/ijcssport/index
    feed_kind: xml_index
    feed_url: https://dblp.org/db/journals/ijcssport/index.xml
    submission_url: https://reference-global.com/journal/IJCSS
    cadence: biannual
    notes:
      - Publisher page exposes a journal RSS link in the footer, but the verified HTML pointed to an internal Sciendo host.
      - DBLP XML is a practical machine-readable fallback for article metadata.
