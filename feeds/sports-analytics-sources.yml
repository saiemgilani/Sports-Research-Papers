  - id: jssm
    name: Journal of Sports Science and Medicine
    publisher: Journal of Sports Science and Medicine
    type: journal
    priority: adjacent
    homepage: https://www.jssm.org/
    feed_kind: rss
    feed_url: https://www.jssm.org/rss/content.php
    additional_feeds:
      - label: Articles in press
        url: https://www.jssm.org/rss/inpres.php
    submission_url: https://www.jssm.org/authors.php
    cadence: quarterly
    notes:
      - Broader sports science and sports medicine scope, but useful for quantitative performance, training, and biomechanics papers.
      - Publishes open access research, case studies, review articles, and congress/symposium abstracts.
    tags: [journal, sports-science, sports-medicine, biomechanics, performance]

